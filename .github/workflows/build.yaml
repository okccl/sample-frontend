name: Build and Push
on:
  push:
    branches:
      - main
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ccl-labs/sample-frontend
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4
      - name: GHCRへのログイン
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: イメージメタデータの生成
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
      - name: イメージのビルドとプッシュ
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
  trigger-update:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: GitHub App トークンの生成
        id: token
        uses: actions/create-github-app-token@v3.1.1
        with:
          client-id: ${{ vars.GITOPS_APP_CLIENT_ID }}
          private-key: ${{ secrets.GITOPS_APP_PRIVATE_KEY }}
          owner: ccl-labs
          repositories: platform-gitops
      - name: platform-gitopsにrepository_dispatchを送信
        run: |
          curl -fsS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ steps.token.outputs.token }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/ccl-labs/platform-gitops/dispatches \
            -d '{
              "event_type": "update-image",
              "client_payload": {
                "image_tag": "${{ needs.build-and-push.outputs.image_tag }}",
                "image_repository": "ghcr.io/ccl-labs/sample-frontend"
              }
            }'
